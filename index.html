<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Project Ideas</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css" />
        <script src="gpt.js"></script>
    </head>
    <body>
        <main class="page-shell">
            <section class="hero">
                <p class="eyebrow">Idea Generator</p>
                <h1>Pick a project worth building next.</h1>
                <p class="intro">
                    A shortlist of starter concepts you can turn into a
                    portfolio piece, weekend experiment, or real product.
                </p>
                <div class="search-shell">
                    <label class="search-label" for="idea-search">
                        Search project ideas
                    </label>
                    <input
                        id="idea-search"
                        class="search-input"
                        type="search"
                        placeholder="Search ideas like poster, debate, game..."
                    />
                </div>
            </section>

            <section
                class="ideas-grid"
                id="ideas-grid"
                aria-label="Project idea options"
            ></section>
        </main>
    </body>
</html>
